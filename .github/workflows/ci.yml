# ==============================================================
# CI Pipeline - ComKit
# Runs on every push/PR to main branch
# Stages: Lint & Static Analysis → Unit Test → Integration Test → Build Image
# ==============================================================

name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io

jobs:
  # ============================================
  # Stage 1: Lint & Static Analysis
  # ============================================
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # --- Backend Lint (Python - ruff) ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend lint tools
        run: pip install ruff

      - name: Run ruff linter (backend)
        run: ruff check server-fastapi/ --output-format=github

      - name: Run ruff formatter check (backend)
        run: ruff format --check server-fastapi/

      # --- Frontend Lint (TypeScript check) ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install frontend dependencies
        run: cd ui && npm ci || npm install

      - name: Run TypeScript type check (frontend)
        run: cd ui && npx nuxi typecheck || true

  # ============================================
  # Stage 2: Unit Test
  # ============================================
  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      # --- Backend Unit Tests ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          cd server-fastapi
          pip install -r requirements.txt
          pip install -r ../test-server/requirements.txt

      - name: Start backend server
        run: |
          cd server-fastapi
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          echo "Waiting for server to start..."
          timeout 30 bash -c 'until curl -sf http://localhost:8000/ > /dev/null 2>&1; do sleep 1; done'
          echo "Server is ready!"
        env:
          ENVIRONMENT: testing
          SECRET_KEY: test-secret-key-for-ci
          DATABASE_URL: sqlite:///./test.db

      - name: Run backend unit tests
        run: |
          cd test-server
          python -m pytest test_register.py test_login.py test_homepage.py -v --tb=short
        env:
          BASE_URL: http://localhost:8000
          ENVIRONMENT: testing
          SECRET_KEY: test-secret-key-for-ci
          DATABASE_URL: sqlite:///./test.db

      # --- Frontend Unit Tests ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install frontend dependencies
        run: cd ui && npm ci || npm install

      - name: Run frontend unit tests (Vitest)
        run: cd ui && npm run test:run

      # --- Upload Test Results ---
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: test-results/

  # ============================================
  # Stage 3: Integration Test (Playwright E2E)
  # ============================================
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: unit-test

    steps:
      - uses: actions/checkout@v4

      # --- Start Backend (native) ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          cd server-fastapi
          pip install -r requirements.txt

      - name: Start backend server
        run: |
          cd server-fastapi
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          echo "Waiting for backend..."
          timeout 60 bash -c 'until curl -sf http://localhost:8000/ > /dev/null 2>&1; do sleep 2; done'
          echo "Backend is ready!"
        env:
          ENVIRONMENT: testing
          SECRET_KEY: ci-test-secret-key-12345
          DATABASE_URL: sqlite:///./test_integration.db

      # --- Start Frontend (native) ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install frontend dependencies
        run: cd ui && npm ci || npm install

      - name: Start frontend dev server
        run: |
          cd ui
          npx nuxt dev --host 0.0.0.0 --port 8001 &
          echo "Waiting for frontend..."
          timeout 180 bash -c 'until curl -sf http://localhost:8001/login > /dev/null 2>&1; do sleep 3; done'
          echo "Frontend is ready!"
        env:
          API_BASE_URL: http://localhost:8000

      - name: Verify services are running
        run: |
          curl -f http://localhost:8000/ || exit 1
          curl -f http://localhost:8001/login || exit 1

      # --- Run Playwright E2E Tests ---
      - name: Install Playwright dependencies
        run: |
          cd end2end-test
          npm install
          npx playwright install --with-deps chromium

      - name: Run integration tests (Playwright)
        run: |
          cd end2end-test
          npx playwright test TestAlurPengguna.js --project=chromium
        env:
          PLAYWRIGHT_SKIP_WEB_SERVER: "1"
          BASE_URL: http://localhost:8001
          CI: true

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            end2end-test/test-results/
            end2end-test/playwright-report/

  # ============================================
  # Stage 4: Build Image
  # ============================================
  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: integration-test
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set image names (lowercase)
        run: |
          echo "BACKEND_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/backend" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/frontend" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Build Backend Image ---
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: server-fastapi
          target: production
          push: false
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Build Frontend Image ---
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ui
          target: production
          push: false
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
